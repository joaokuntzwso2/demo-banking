openapi: 3.0.3
info:
  title: Banking Backend - Cards API
  version: 1.0.0
  description: Card status endpoints for the banking demo backend.
servers:
  - url: http://localhost:8080

paths:
  /cards/{cardId}/status:
    get:
      operationId: getCardStatus
      summary: Get card status by cardId
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
          example: CARD-CR-BR-001
      responses:
        "200":
          description: Card status returned
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardStatus"
        "404":
          description: Card not found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  headers:
    XCorrelationId:
      description: Correlation ID for tracing across services.
      schema:
        type: string

  schemas:
    MessageResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          example: Card not found
      required: [message]

    CardStatus:
      type: object
      additionalProperties: false
      properties:
        cardId:
          type: string
        customerId:
          type: string
        accountId:
          type: string
        type:
          type: string
          example: CREDIT
        brand:
          type: string
          example: VISA
        maskedPan:
          type: string
          example: "**** **** **** 1234"
        status:
          type: string
          enum: [ACTIVE, BLOCKED, UNDER_REVIEW, EXPIRED]
        lastUpdatedAt:
          type: string
          format: date-time
      required:
        - cardId
        - customerId
        - accountId
        - type
        - brand
        - maskedPan
        - status
        - lastUpdatedAt