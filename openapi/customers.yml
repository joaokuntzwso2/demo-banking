openapi: 3.0.3
info:
  title: Banking Backend - Customers API
  version: 1.0.0
  description: Customer profile endpoints for the banking demo backend.
servers:
  - url: http://localhost:8080

paths:
  /customers/profile/{customerId}:
    get:
      operationId: getCustomerProfile
      summary: Get customer profile by customerId
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
          example: CUST-BR-001
      responses:
        "200":
          description: Customer profile returned
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "404":
          description: Customer not found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  headers:
    XCorrelationId:
      description: Correlation ID for tracing across services.
      schema:
        type: string

  schemas:
    MessageResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          example: Customer not found
      required: [message]

    CustomerAccountRef:
      type: object
      additionalProperties: false
      properties:
        accountId:
          type: string
          example: ACC-CHK-BR-001
        type:
          type: string
          example: CHECKING
      required: [accountId, type]

    CustomerCardRef:
      type: object
      additionalProperties: false
      properties:
        cardId:
          type: string
          example: CARD-CR-BR-001
        type:
          type: string
          example: CREDIT
      required: [cardId, type]

    CustomerProfile:
      type: object
      additionalProperties: false
      properties:
        customerId:
          type: string
        cpf:
          type: string
        name:
          type: string
        segment:
          type: string
          example: VAREJO
        kycStatus:
          type: string
          example: APPROVED
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/CustomerAccountRef"
        cards:
          type: array
          items:
            $ref: "#/components/schemas/CustomerCardRef"
      required:
        - customerId
        - cpf
        - name
        - segment
        - kycStatus
        - accounts
        - cards