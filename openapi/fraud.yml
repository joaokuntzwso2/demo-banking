openapi: 3.0.3
info:
  title: Banking Backend - Fraud API
  version: 1.0.0
  description: Fraud alert ingestion endpoints for the banking demo backend.
servers:
  - url: http://localhost:8080

paths:
  /fraud/alerts:
    post:
      operationId: postFraudAlert
      summary: Store a fraud alert event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FraudAlertInput"
      responses:
        "201":
          description: Stored fraud alert
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudAlertStored"

components:
  headers:
    XCorrelationId:
      description: Correlation ID for tracing across services.
      schema:
        type: string

  schemas:
    FraudAlertInput:
      type: object
      additionalProperties: false
      properties:
        alertType:
          type: string
          example: UNUSUAL_PIX_PATTERN
        riskLevel:
          type: string
          example: HIGH
        accountId:
          type: string
          example: ACC-CHK-BR-001
        cardId:
          type: string
          nullable: true
          example: CARD-CR-BR-001
        details:
          type: string
          example: Multiple PIX attempts in short interval
      required:
        - alertType
        - riskLevel
        - details

    FraudAlertStored:
      allOf:
        - $ref: "#/components/schemas/FraudAlertInput"
        - type: object
          additionalProperties: false
          properties:
            fraudAlertId:
              type: string
              example: FRD-2026-03-31T12:12:00.000Z
            createdAt:
              type: string
              format: date-time
          required: [fraudAlertId, createdAt]