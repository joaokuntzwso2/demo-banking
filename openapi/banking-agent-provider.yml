  /v1/knowledge/chat:
    post:
      summary: Chat with Banking Knowledge Agent
      description: >
        Receives a user message and a sticky sessionId,
        uses an in-memory RAG knowledge repository to answer policy,
        handbook, FAQ, and procedure questions in a safe way,
        and returns a final response along with LLM usage metadata.
      operationId: knowledgeChat
      requestBody:
        required: true
        description: Request payload for the Knowledge Agent.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRequest'
            example:
              sessionId: "sess-knowledge-1"
              message: "What does the policy say about PIX review and TED settlement timing?"
      responses:
        '200':
          description: Successful response from Knowledge Agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              example:
                sessionId: "sess-knowledge-1"
                agentName: "BankingKnowledgeAgent"
                promptVersion: "banking-knowledge-v1.0.0"
                message: "The knowledge repository indicates that PIX payments may be completed immediately, rejected, or placed under review depending on limits and review signals, and that TED settlement timing should not be guaranteed unless explicitly confirmed by system status."
                llm:
                  responseModel: "gpt-4o"
                  promptTokenCount: 21
                  completionTokenCount: 108
                  totalTokenCount: 129
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          description: Internal error during agent execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
      security:
        - default: []
      x-auth-type: Application & Application User
      x-throttling-tier: Unlimited
      x-wso2-application-security:
        security-types:
          - api_key
        optional: false