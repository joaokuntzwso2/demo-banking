openapi: 3.0.3
info:
  title: Banking Backend - Compliance API
  version: 1.0.0
  description: Compliance audit endpoints for the banking demo backend.
servers:
  - url: http://localhost:8080

paths:
  /compliance/audit:
    post:
      operationId: postComplianceAudit
      summary: Store a compliance audit event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceEventInput"
      responses:
        "201":
          description: Stored compliance event
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceEventStored"

    get:
      operationId: listComplianceAudit
      summary: List recent compliance events
      responses:
        "200":
          description: Recent compliance events
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplianceEventStored"

components:
  headers:
    XCorrelationId:
      description: Correlation ID for tracing across services.
      schema:
        type: string

  schemas:
    ComplianceEventInput:
      type: object
      additionalProperties: false
      properties:
        eventType:
          type: string
          example: AML_REVIEW
        severity:
          type: string
          example: HIGH
        customerId:
          type: string
          example: CUST-BR-001
        details:
          type: string
          example: Transaction pattern requires review
      required:
        - eventType
        - severity
        - customerId
        - details

    ComplianceEventStored:
      allOf:
        - $ref: "#/components/schemas/ComplianceEventInput"
        - type: object
          additionalProperties: false
          properties:
            complianceId:
              type: string
              example: CMP-2026-03-31T12:10:00.000Z
            createdAt:
              type: string
              format: date-time
          required: [complianceId, createdAt]