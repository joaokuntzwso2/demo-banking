openapi: 3.0.3
info:
  title: Banking Backend Admin API
  version: 1.0.0
  description: Admin endpoints for resetting and inspecting backend demo state.

servers:
  - url: http://banking-backend:8080

paths:
  /admin/reset:
    post:
      operationId: resetBackendState
      summary: Reset backend state
      responses:
        '200':
          description: State reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  snapshot:
                    $ref: '#/components/schemas/AdminSnapshot'

  /admin/snapshot:
    get:
      operationId: getBackendSnapshot
      summary: Get backend state snapshot
      responses:
        '200':
          description: Snapshot returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshot:
                    $ref: '#/components/schemas/AdminSnapshot'

components:
  schemas:
    AdminSnapshot:
      type: object
      properties:
        customers:
          type: integer
        accounts:
          type: integer
        cards:
          type: integer
        payments:
          type: integer
        transfers:
          type: integer
        complianceEvents:
          type: integer
        fraudAlerts:
          type: integer
        processorEvents:
          type: integer