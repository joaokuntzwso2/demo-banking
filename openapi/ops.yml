openapi: 3.0.3
info:
  title: Banking Backend - Operations API
  version: 1.0.0
  description: Operations telemetry endpoints for processor lifecycle callbacks.
servers:
  - url: http://localhost:8080

paths:
  /ops/processor-events:
    post:
      operationId: postProcessorEvent
      summary: Store processor lifecycle event from MI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessorEventInput"
            examples:
              messageForwarded:
                value:
                  processor: BANKING_PROCESSOR
                  operation: PIX_PAYMENT
                  eventType: MESSAGE_FORWARDED
                  correlationId: corr-123
                  timestamp: "2026-03-31T12:00:00Z"
              processorDeactivated:
                value:
                  processor: BANKING_PROCESSOR
                  operation: TED_TRANSFER
                  eventType: DEACTIVATED
                  reason: Backend unavailable
                  errorCode: "101503"
                  correlationId: corr-456
                  timestamp: "2026-03-31T12:05:00Z"
      responses:
        "202":
          description: Event received
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    example: RECEIVED
                  count:
                    type: integer
                    minimum: 0
                    example: 3
                required:
                  - status
                  - count

    get:
      operationId: listProcessorEvents
      summary: List recent processor events
      responses:
        "200":
          description: Recent processor events
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcessorEventStored"

components:
  headers:
    XCorrelationId:
      description: Correlation ID for tracing across services.
      schema:
        type: string

  schemas:
    ProcessorEventInput:
      type: object
      description: >
        Flexible processor callback payload sent by MI. The backend accepts a
        demo-friendly JSON object and stores it with an added receivedAt field.
      additionalProperties: true
      properties:
        processor:
          type: string
          example: BANKING_PROCESSOR
        operation:
          type: string
          example: PIX_PAYMENT
        eventType:
          type: string
          example: MESSAGE_FORWARDED
        reason:
          type: string
          example: Backend unavailable
        errorCode:
          type: string
          example: "101503"
        correlationId:
          type: string
          example: corr-123
        timestamp:
          type: string
          example: "2026-03-31T12:00:00Z"

    ProcessorEventStored:
      allOf:
        - $ref: "#/components/schemas/ProcessorEventInput"
        - type: object
          additionalProperties: true
          properties:
            receivedAt:
              type: string
              format: date-time
              example: "2026-03-31T12:07:04.318Z"
          required:
            - receivedAt