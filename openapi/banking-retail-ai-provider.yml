openapi: 3.0.3
info:
  title: Banking Retail AI Adapter
  version: 1.0.0
servers:
  - url: http://banking-agent:8293/v1/ai/retail
paths:
  /chat/completions:
    post:
      operationId: retailChatCompletions
      summary: OpenAI-compatible chat completions for Banking Retail Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                      content:
                        type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: OpenAI-compatible completion response
          content:
            application/json:
              schema:
                type: object