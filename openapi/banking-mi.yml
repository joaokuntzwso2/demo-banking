openapi: 3.0.3
info:
  title: Banking MI Unified API
  version: 1.0.0
  description: Unified WSO2 Micro Integrator facade for the banking demo.

servers:
  - url: http://banking-mi:8290

paths:
  /customers/1.0.0/profile/{customerId}:
    get:
      operationId: getCustomerProfileViaMI
      summary: Get customer profile
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Customer profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerProfile'
        '404':
          description: Customer not found
        '500':
          description: Integration error
        '502':
          description: Backend unavailable

  /accounts/1.0.0/balance/{accountId}:
    get:
      operationId: getAccountBalanceViaMI
      summary: Get account balance
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account balance returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalance'
        '404':
          description: Account not found
        '500':
          description: Integration error
        '502':
          description: Backend unavailable

  /cards/1.0.0/status/{cardId}:
    get:
      operationId: getCardStatusViaMI
      summary: Get card status
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Card status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardStatus'
        '404':
          description: Card not found
        '500':
          description: Integration error
        '502':
          description: Backend unavailable

  /payments/1.0.0/pix/sync:
    post:
      operationId: createPixPaymentSyncViaMI
      summary: Submit PIX payment synchronously
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PixPaymentRequest'
      responses:
        '200':
          description: PIX payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PixPayment'
        '400':
          description: Validation or business error
        '500':
          description: Integration error
        '502':
          description: Backend unavailable

  /payments/1.0.0/pix/async:
    post:
      operationId: createPixPaymentAsyncViaMI
      summary: Queue PIX payment asynchronously
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PixPaymentAsyncRequest'
      responses:
        '202':
          description: PIX payment queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAck'
        '500':
          description: Integration error
        '502':
          description: Backend unavailable

  /payments/1.0.0:
    get:
      operationId: getPaymentStatusViaMI
      summary: Get payment status
      parameters:
        - name: paymentId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PixPayment'
        '404':
          description: Payment not found
        '500':
          description: Integration error
        '502':
          description: Backend unavailable

  /transfers/1.0.0/ted/async:
    post:
      operationId: createTedTransferAsyncViaMI
      summary: Queue TED transfer asynchronously
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TedTransferRequest'
      responses:
        '202':
          description: TED transfer queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAck'
        '500':
          description: Integration error
        '502':
          description: Backend unavailable

  /transfers/1.0.0:
    get:
      operationId: getTransferStatusViaMI
      summary: Get transfer status
      parameters:
        - name: transferId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transfer returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TedTransfer'
        '404':
          description: Transfer not found
        '500':
          description: Integration error
        '502':
          description: Backend unavailable

  /compliance/1.0.0/audit:
    post:
      operationId: postComplianceAuditViaMI
      summary: Create compliance audit event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceEventInput'
      responses:
        '200':
          description: Compliance event recorded
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Integration error
        '502':
          description: Backend unavailable

  /fraud/1.0.0/alerts:
    post:
      operationId: postFraudAlertViaMI
      summary: Create fraud alert event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FraudAlertInput'
      responses:
        '200':
          description: Fraud alert recorded
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Integration error
        '502':
          description: Backend unavailable

components:
  schemas:
    CustomerProfile:
      type: object
      properties:
        customerId:
          type: string
        cpf:
          type: string
        name:
          type: string
        kycStatus:
          type: string
        riskRating:
          type: string
        preferredBranchId:
          type: string
        accounts:
          type: array
          items:
            type: string
        cards:
          type: array
          items:
            type: string

    AccountBalance:
      type: object
      properties:
        accountId:
          type: string
        customerId:
          type: string
        accountType:
          type: string
        currency:
          type: string
        availableBalance:
          type: number
        ledgerBalance:
          type: number
        status:
          type: string
        dailyPixLimit:
          type: number
        branchId:
          type: string
        lastUpdatedAt:
          type: string
          format: date-time

    CardStatus:
      type: object
      properties:
        cardId:
          type: string
        customerId:
          type: string
        cardType:
          type: string
        network:
          type: string
        status:
          type: string
        limit:
          type: number
        availableLimit:
          type: number
        embossedName:
          type: string
        last4:
          type: string
        internationalEnabled:
          type: boolean
        lastUpdatedAt:
          type: string
          format: date-time

    PixPaymentRequest:
      type: object
      required: [accountId, beneficiaryName, beneficiaryBank, amountBr]
      properties:
        accountId:
          type: string
        beneficiaryName:
          type: string
        beneficiaryBank:
          type: string
        amountBr:
          type: number

    PixPaymentAsyncRequest:
      type: object
      required: [accountId, beneficiaryName, beneficiaryBank, destinationKey, amountBr]
      properties:
        accountId:
          type: string
        beneficiaryName:
          type: string
        beneficiaryBank:
          type: string
        destinationKey:
          type: string
        amountBr:
          type: number

    PixPayment:
      type: object
      properties:
        paymentId:
          type: string
        accountId:
          type: string
        paymentRail:
          type: string
        beneficiaryName:
          type: string
        beneficiaryBank:
          type: string
        amountBr:
          type: number
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time

    TedTransferRequest:
      type: object
      required: [sourceAccountId, destinationBankCode, amountBr]
      properties:
        sourceAccountId:
          type: string
        destinationBankCode:
          type: string
        amountBr:
          type: number

    TedTransfer:
      type: object
      properties:
        transferId:
          type: string
        fromAccountId:
          type: string
        toBankCode:
          type: string
        toAccountMasked:
          type: string
        amountBr:
          type: number
        channel:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time

    ComplianceEventInput:
      type: object
      required: [eventType, severity, customerId, details]
      properties:
        eventType:
          type: string
        severity:
          type: string
        customerId:
          type: string
        details:
          type: string

    FraudAlertInput:
      type: object
      required: [alertType, riskLevel, details]
      properties:
        alertType:
          type: string
        riskLevel:
          type: string
        accountId:
          type: string
          nullable: true
        cardId:
          type: string
          nullable: true
        details:
          type: string

    AsyncAck:
      type: object
      properties:
        status:
          type: string
        operation:
          type: string
        correlationId:
          type: string
        queue:
          type: string
        processor:
          type: string
        timestamp:
          type: string