openapi: 3.0.3
info:
  title: Banking MI - Unified API
  version: 1.0.0
  description: |
    Unified WSO2 Micro Integrator facade for the Banking demo.
    This OpenAPI spec matches the deployed Synapse API `BankingUnifiedAPI`
    and its resources (customers, accounts, cards, payments, transfers, compliance, fraud).

servers:
  - url: http://localhost:8290

tags:
  - name: Customers
  - name: Accounts
  - name: Cards
  - name: Payments
  - name: Transfers
  - name: Compliance
  - name: Fraud

paths:
  /customers/1.0.0/profile/{customerId}:
    get:
      tags: [Customers]
      operationId: getCustomerProfileViaMI
      summary: Get customer profile (sync)
      description: Proxies to backend `/customers/profile/{customerId}`.
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
          example: CUST-BR-001
      responses:
        "200":
          description: Customer profile found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "404":
          description: Customer not found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          $ref: "#/components/responses/IntegrationError"
        "502":
          $ref: "#/components/responses/IntegrationError"

  /accounts/1.0.0/balance/{accountId}:
    get:
      tags: [Accounts]
      operationId: getAccountBalanceViaMI
      summary: Get account balance (sync)
      description: Proxies to backend `/accounts/{accountId}/balance`.
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          example: ACC-CHK-BR-001
      responses:
        "200":
          description: Account balance found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBalance"
        "404":
          description: Account not found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          $ref: "#/components/responses/IntegrationError"
        "502":
          $ref: "#/components/responses/IntegrationError"

  /cards/1.0.0/status/{cardId}:
    get:
      tags: [Cards]
      operationId: getCardStatusViaMI
      summary: Get card status (sync)
      description: Proxies to backend `/cards/{cardId}/status`.
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
          example: CARD-CR-BR-001
      responses:
        "200":
          description: Card found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardStatus"
        "404":
          description: Card not found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          $ref: "#/components/responses/IntegrationError"
        "502":
          $ref: "#/components/responses/IntegrationError"

  /payments/1.0.0/pix/sync:
    post:
      tags: [Payments]
      operationId: createPixPaymentSyncViaMI
      summary: Submit PIX payment (sync)
      description: Proxies to backend `/payments/pix`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PixPaymentRequest"
      responses:
        "201":
          description: PIX payment created
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PixPayment"
        "400":
          description: Backend validation or business error
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/IntegrationError"
        "502":
          $ref: "#/components/responses/IntegrationError"

  /payments/1.0.0/pix/async:
    post:
      tags: [Payments]
      operationId: createPixPaymentAsyncViaMI
      summary: Queue PIX payment (async)
      description: |
        Stores a message in MI message store `PixPaymentStore`.
        MessageProcessor `PixPaymentProcessor` forwards to backend `/payments/pix`.
        Returns 202 QUEUED via `AsyncAckSeq`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PixPaymentRequest"
      responses:
        "202":
          description: Queued for async processing
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncAck"
        "500":
          $ref: "#/components/responses/IntegrationError"
        "502":
          $ref: "#/components/responses/IntegrationError"

  /payments/1.0.0:
    get:
      tags: [Payments]
      operationId: getPaymentStatusViaMI
      summary: Get payment status (sync)
      description: Proxies to backend `/payments/{paymentId}` using query parameter `paymentId`.
      parameters:
        - name: paymentId
          in: query
          required: true
          schema:
            type: string
          example: PMT-PIX-20260315-0001
      responses:
        "200":
          description: Payment found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PixPayment"
        "404":
          description: Payment not found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          $ref: "#/components/responses/IntegrationError"
        "502":
          $ref: "#/components/responses/IntegrationError"

  /transfers/1.0.0/ted/async:
    post:
      tags: [Transfers]
      operationId: createTedTransferAsyncViaMI
      summary: Queue TED transfer (async)
      description: |
        Stores a message in MI message store `TedTransferStore`.
        MessageProcessor `TedTransferProcessor` forwards to backend `/transfers/ted`.
        Returns 202 QUEUED via `AsyncAckSeq`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TedTransferRequest"
      responses:
        "202":
          description: Queued for async processing
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncAck"
        "500":
          $ref: "#/components/responses/IntegrationError"
        "502":
          $ref: "#/components/responses/IntegrationError"

  /transfers/1.0.0:
    get:
      tags: [Transfers]
      operationId: getTransferStatusViaMI
      summary: Get transfer status (sync)
      description: Proxies to backend `/transfers/{transferId}` using query parameter `transferId`.
      parameters:
        - name: transferId
          in: query
          required: true
          schema:
            type: string
          example: TRF-20260315-0001
      responses:
        "200":
          description: Transfer found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TedTransfer"
        "404":
          description: Transfer not found
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          $ref: "#/components/responses/IntegrationError"
        "502":
          $ref: "#/components/responses/IntegrationError"

  /compliance/1.0.0/audit:
    post:
      tags: [Compliance]
      operationId: postComplianceAuditViaMI
      summary: Submit a compliance audit event (sync)
      description: Proxies to backend `/compliance/audit`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceEventInput"
      responses:
        "201":
          description: Stored compliance event
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceEventStored"
        "500":
          $ref: "#/components/responses/IntegrationError"
        "502":
          $ref: "#/components/responses/IntegrationError"

  /fraud/1.0.0/alerts:
    post:
      tags: [Fraud]
      operationId: postFraudAlertViaMI
      summary: Submit a fraud alert event (sync)
      description: Proxies to backend `/fraud/alerts`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FraudAlertInput"
      responses:
        "201":
          description: Stored fraud alert
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudAlertStored"
        "500":
          $ref: "#/components/responses/IntegrationError"
        "502":
          $ref: "#/components/responses/IntegrationError"

components:
  headers:
    XCorrelationId:
      description: Correlation ID for tracing across MI and downstream services.
      schema:
        type: string

  responses:
    IntegrationError:
      description: MI integration fault payload (CommonFaultSeq)
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/XCorrelationId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/IntegrationError"

  schemas:
    MessageResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
      required: [message]

    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
        correlationId:
          type: string
        error:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [message, correlationId, error]

    IntegrationError:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          example: Error in banking integration layer
        correlationId:
          type: string
          example: urn:uuid:1234...
        errorCode:
          type: string
          example: "101503"
        errorMessage:
          type: string
          example: Error connecting to the backend
      required: [message, correlationId, errorCode, errorMessage]

    AsyncAck:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [QUEUED]
        operation:
          type: string
          example: PIX_PAYMENT
        correlationId:
          type: string
          example: urn:uuid:1234...
        queue:
          type: string
          example: PixPaymentStore
        processor:
          type: string
          example: PixPaymentProcessor
        timestamp:
          type: string
          example: "1736154485123"
      required: [status, operation, correlationId, queue, processor, timestamp]

    CustomerAccountRef:
      type: object
      additionalProperties: false
      properties:
        accountId:
          type: string
        type:
          type: string
      required: [accountId, type]

    CustomerCardRef:
      type: object
      additionalProperties: false
      properties:
        cardId:
          type: string
        type:
          type: string
      required: [cardId, type]

    CustomerProfile:
      type: object
      additionalProperties: false
      properties:
        customerId:
          type: string
        cpf:
          type: string
        name:
          type: string
        segment:
          type: string
        kycStatus:
          type: string
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/CustomerAccountRef"
        cards:
          type: array
          items:
            $ref: "#/components/schemas/CustomerCardRef"
      required:
        - customerId
        - cpf
        - name
        - segment
        - kycStatus
        - accounts
        - cards

    AccountBalance:
      type: object
      additionalProperties: false
      properties:
        accountId:
          type: string
        customerId:
          type: string
        type:
          type: string
        currency:
          type: string
        balance:
          type: number
          format: double
        availableBalance:
          type: number
          format: double
        dailyPixLimit:
          type: number
          format: double
        status:
          type: string
      required:
        - accountId
        - customerId
        - type
        - currency
        - balance
        - availableBalance
        - dailyPixLimit
        - status

    CardStatus:
      type: object
      additionalProperties: false
      properties:
        cardId:
          type: string
        customerId:
          type: string
        accountId:
          type: string
        type:
          type: string
        brand:
          type: string
        maskedPan:
          type: string
        status:
          type: string
          enum: [ACTIVE, BLOCKED, UNDER_REVIEW, EXPIRED]
        lastUpdatedAt:
          type: string
          format: date-time
      required:
        - cardId
        - customerId
        - accountId
        - type
        - brand
        - maskedPan
        - status
        - lastUpdatedAt

    PixPaymentRequest:
      type: object
      additionalProperties: false
      properties:
        accountId:
          type: string
        beneficiaryName:
          type: string
        beneficiaryBank:
          type: string
        amountBr:
          type: number
          format: double
      required: [accountId, beneficiaryName, beneficiaryBank, amountBr]

    PixPayment:
      type: object
      additionalProperties: false
      properties:
        paymentId:
          type: string
        accountId:
          type: string
        customerId:
          type: string
        method:
          type: string
          enum: [PIX]
        beneficiaryName:
          type: string
        beneficiaryBank:
          type: string
        amountBr:
          type: number
          format: double
        currency:
          type: string
        status:
          type: string
          enum: [COMPLETED, PENDING_REVIEW, FAILED]
        createdAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
      required:
        - paymentId
        - accountId
        - customerId
        - method
        - beneficiaryName
        - beneficiaryBank
        - amountBr
        - currency
        - status
        - createdAt
        - lastUpdatedAt

    TedTransferRequest:
      type: object
      additionalProperties: false
      properties:
        fromAccountId:
          type: string
        toBankCode:
          type: string
        toAccountMasked:
          type: string
        amountBr:
          type: number
          format: double
        channel:
          type: string
      required: [fromAccountId, toBankCode, toAccountMasked, amountBr, channel]

    TedTransfer:
      type: object
      additionalProperties: false
      properties:
        transferId:
          type: string
        fromAccountId:
          type: string
        customerId:
          type: string
        method:
          type: string
          enum: [TED]
        toBankCode:
          type: string
        toAccountMasked:
          type: string
        amountBr:
          type: number
          format: double
        currency:
          type: string
        channel:
          type: string
        status:
          type: string
          enum: [COMPLETED, PENDING_REVIEW, FAILED]
        createdAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
      required:
        - transferId
        - fromAccountId
        - customerId
        - method
        - toBankCode
        - toAccountMasked
        - amountBr
        - currency
        - channel
        - status
        - createdAt
        - lastUpdatedAt

    ComplianceEventInput:
      type: object
      additionalProperties: false
      properties:
        eventType:
          type: string
        severity:
          type: string
        customerId:
          type: string
        details:
          type: string
      required: [eventType, severity, customerId, details]

    ComplianceEventStored:
      allOf:
        - $ref: "#/components/schemas/ComplianceEventInput"
        - type: object
          additionalProperties: false
          properties:
            complianceId:
              type: string
            createdAt:
              type: string
              format: date-time
          required: [complianceId, createdAt]

    FraudAlertInput:
      type: object
      additionalProperties: false
      properties:
        alertType:
          type: string
        riskLevel:
          type: string
        accountId:
          type: string
          nullable: true
        cardId:
          type: string
          nullable: true
        details:
          type: string
      required: [alertType, riskLevel, details]

    FraudAlertStored:
      allOf:
        - $ref: "#/components/schemas/FraudAlertInput"
        - type: object
          additionalProperties: false
          properties:
            fraudAlertId:
              type: string
            createdAt:
              type: string
              format: date-time
          required: [fraudAlertId, createdAt]