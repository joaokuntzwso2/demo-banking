services:
  banking-backend:
    build: ./banking-backend-js
    container_name: banking-backend
    ports:
      - "8080:8080"

  wso2mi:
    build:
      context: ./banking-mi
      dockerfile: deployment/docker/Dockerfile
    container_name: banking-mi
    image: banking-mi:1.0.0
    ports:
      - "8290:8290"
    environment:
      JAVA_OPTS: >
        -Xms256m
        -Xmx768m
        -XX:MaxMetaspaceSize=256m
        -XX:+UseG1GC
        -DenableHotDeployment=false
    depends_on:
      - banking-backend
    volumes:
      - ./banking-mi/src/main/wso2mi/artifacts/apis:/home/wso2carbon/wso2mi-4.5.0/repository/deployment/server/synapse-configs/default/api
      - ./banking-mi/src/main/wso2mi/artifacts/endpoints:/home/wso2carbon/wso2mi-4.5.0/repository/deployment/server/synapse-configs/default/endpoints
      - ./banking-mi/src/main/wso2mi/artifacts/sequences:/home/wso2carbon/wso2mi-4.5.0/repository/deployment/server/synapse-configs/default/sequences
      - ./banking-mi/src/main/wso2mi/artifacts/message-stores:/home/wso2carbon/wso2mi-4.5.0/repository/deployment/server/synapse-configs/default/message-stores
      - ./banking-mi/src/main/wso2mi/artifacts/message-processors:/home/wso2carbon/wso2mi-4.5.0/repository/deployment/server/synapse-configs/default/message-processors
      - ./banking-mi/src/main/wso2mi/artifacts/inbound-endpoints:/home/wso2carbon/wso2mi-4.5.0/repository/deployment/server/synapse-configs/default/inbound-endpoints
      - ./banking-mi/src/main/wso2mi/artifacts/local-entries:/home/wso2carbon/wso2mi-4.5.0/repository/deployment/server/synapse-configs/default/local-entries
      - ./banking-mi/deployment/deployment.toml:/home/wso2carbon/wso2mi-4.5.0/conf/deployment.toml:ro

  banking-agent:
    build: ./banking_agent_bi
    container_name: banking-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - BACKEND_BASE_URL=http://banking-mi:8290
      - HTTP_LISTENER_PORT=8293
      - BANKING_AGENT_ID=${BANKING_AGENT_ID:-}
      - BANKING_AGENT_SECRET=${BANKING_AGENT_SECRET:-}
      - WSO2_IS_BASE_URL=${WSO2_IS_BASE_URL:-https://wso2is:9444}
      - AGENT_GATEWAY_BASE_URL=http://apim:8280
      - AGENT_GATEWAY_AUTH_MODE=api_key
      - AGENT_GATEWAY_API_KEY_HEADER=apikey
      - AGENT_GATEWAY_ACCESS_TOKEN=${AGENT_GATEWAY_ACCESS_TOKEN:-}

      - BAL_CONFIG_VAR_AGENT_GATEWAY_BASE_URL=http://apim:8280
      - BAL_CONFIG_VAR_AGENT_GATEWAY_AUTH_MODE=api_key
      - BAL_CONFIG_VAR_AGENT_GATEWAY_API_KEY_HEADER=apikey
      - BAL_CONFIG_VAR_AGENT_GATEWAY_ACCESS_TOKEN=${AGENT_GATEWAY_ACCESS_TOKEN:-}
      - BAL_CONFIG_VAR_ENABLE_OBO_AUTHORIZATION=true
      - BAL_CONFIG_VAR_AGENT_ALLOWED_SCOPES=agent:chat banking:profile:read banking:accounts:read banking:cards:read banking:payments:read banking:transfers:create banking:transfers:read banking:compliance:write banking:fraud:write
  banking-webhook-listener:
    build: ./banking-webhook-listener
    container_name: banking-webhook-listener
    ports:
      - "8099:8099"

  apim:
    image: wso2/wso2am:4.6.0
    container_name: apim
    ports:
      - "9443:9443"
      - "8243:8243"
      - "8280:8280"
    environment:
      JAVA_OPTS: >
        -Xms512m
        -Xmx2048m
        -XX:MaxMetaspaceSize=512m
        -XX:+UseG1GC
    volumes:
      - apim_home:/home/wso2carbon
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9443 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s

  wso2is:
    build: ./wso2is-km
    image: banking-wso2is-km:7.3.0
    container_name: wso2is
    ports:
      - "9444:9444"
    environment:
      JAVA_OPTS: >
        -Xms512m
        -Xmx1536m
        -XX:MaxMetaspaceSize=384m
        -XX:+UseG1GC
        -DportOffset=1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9444 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s

  banking-ui:
    build:
      context: ./banking-demo-ui
      dockerfile: Dockerfile
      args:
        VITE_IS_BASE_URL: ${VITE_IS_BASE_URL:-https://localhost:9444}
        VITE_IS_CLIENT_ID: ${VITE_IS_CLIENT_ID:-REPLACE_WITH_WSO2_IS_SPA_CLIENT_ID}
        VITE_REDIRECT_URL: ${VITE_REDIRECT_URL:-http://localhost:5173}
        VITE_SIGN_OUT_REDIRECT_URL: ${VITE_SIGN_OUT_REDIRECT_URL:-http://localhost:5173}
        VITE_APIM_BASE_URL: ${VITE_APIM_BASE_URL:-http://localhost:5173/gateway}
        VITE_BANKING_MI_CONTEXT: ${VITE_BANKING_MI_CONTEXT:-}
        VITE_AGENT_CONTRACT: ${VITE_AGENT_CONTRACT:-ai-adapter}
        VITE_AGENT_CHAT_URL: ${VITE_AGENT_CHAT_URL:-http://localhost:5173/gateway/v1/ai/omni_a2a/chat/completions}
        VITE_ENABLE_MOCK_AUTH: ${VITE_ENABLE_MOCK_AUTH:-false}
        VITE_MOCK_SCOPES: ${VITE_MOCK_SCOPES:-}
        VITE_AGENT_ID: ${VITE_AGENT_ID:-not-configured}
        VITE_AGENT_NAME: ${VITE_AGENT_NAME:-Banking Omni Assistant Agent}
        VITE_AGENT_PURPOSE: ${VITE_AGENT_PURPOSE:-Governed banking assistant with read-only default permissions.}
    container_name: banking-ui
    ports:
      - "5173:80"
    depends_on:
      - apim
      - wso2mi
      - wso2is
      - banking-agent

volumes:
  apim_home:
  is_home: